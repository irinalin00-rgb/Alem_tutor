<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alem Tutor — Архитектура проекта</title>
<style>
  body { margin: 0; padding: 24px; background: #0a0f1e; font-family: 'Segoe UI', sans-serif; }
  svg { width: 100%; max-width: 900px; display: block; margin: 0 auto; }

  .box { fill: #111827; stroke: rgba(255,255,255,0.12); stroke-width: 0.5; }

  /* Teal */
  .c-teal rect { fill: #0a3d2e; stroke: #1D9E75; stroke-width: 0.5; }
  .c-teal .title { fill: #9FE1CB; font-size: 14px; font-weight: 600; }
  .c-teal .sub   { fill: #5DCAA5; font-size: 12px; }

  /* Purple */
  .c-purple rect { fill: #1e1a3d; stroke: #7F77DD; stroke-width: 0.5; }
  .c-purple .title { fill: #CECBF6; font-size: 14px; font-weight: 600; }
  .c-purple .sub   { fill: #AFA9EC; font-size: 12px; }

  /* Amber */
  .c-amber rect { fill: #2e1f08; stroke: #BA7517; stroke-width: 0.5; }
  .c-amber .title { fill: #FAC775; font-size: 14px; font-weight: 600; }
  .c-amber .sub   { fill: #EF9F27; font-size: 12px; }

  /* Pink */
  .c-pink rect { fill: #2e0a1a; stroke: #D4537E; stroke-width: 0.5; }
  .c-pink .title { fill: #F4C0D1; font-size: 14px; font-weight: 600; }
  .c-pink .sub   { fill: #ED93B1; font-size: 12px; }

  /* Gray */
  .c-gray rect { fill: #1a1a1a; stroke: #5F5E5A; stroke-width: 0.5; }
  .c-gray .title { fill: #D3D1C7; font-size: 14px; font-weight: 600; }
  .c-gray .sub   { fill: #B4B2A9; font-size: 12px; }

  .arr { stroke: rgba(255,255,255,0.3); stroke-width: 1; fill: none; }
  .label { fill: rgba(255,255,255,0.45); font-size: 11px; }
  .platform-bg { fill: rgba(186,117,23,0.07); stroke: rgba(186,117,23,0.25); stroke-width: 0.5; }
  .platform-label { fill: #FAC775; font-size: 15px; font-weight: 600; }
  .platform-sub { fill: #EF9F27; font-size: 11px; }
  .legend-text { fill: rgba(255,255,255,0.5); font-size: 12px; }
  .section-label { fill: rgba(255,255,255,0.2); font-size: 10px; letter-spacing: 1.5px; }
  .status-ok { fill: #4ade80; font-size: 11px; }
  .status-wait { fill: #f59e0b; font-size: 11px; }
  .heading { fill: white; font-size: 22px; font-weight: 700; }
  .subheading { fill: rgba(255,255,255,0.45); font-size: 13px; }
</style>
</head>
<body>
<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(74,222,128,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="900" height="700" fill="url(#grid)"/>

  <!-- Title -->
  <text x="40" y="44" class="heading">Alem Tutor</text>
  <text x="40" y="64" class="subheading">Архитектура проекта — Decentrathon 5.0</text>

  <!-- ===== УЧЕНИК ===== -->
  <g class="c-teal">
    <rect x="40" y="120" width="120" height="60" rx="8"/>
    <text x="100" y="145" text-anchor="middle" class="title">Ученик</text>
    <text x="100" y="163" text-anchor="middle" class="sub">Браузер</text>
  </g>

  <!-- Voice arrow up -->
  <line x1="100" y1="120" x2="100" y2="90" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow-green)"/>
  <text x="108" y="108" class="label">голос</text>

  <!-- Arrow user -> frontend -->
  <line x1="160" y1="150" x2="240" y2="150" class="arr" marker-end="url(#arrow)"/>

  <!-- ===== SPEECH-TO-TEXT ===== -->
  <g class="c-teal">
    <rect x="40" y="50" width="160" height="54" rx="8"/>
    <text x="120" y="72" text-anchor="middle" class="title">Speech-to-text KZ</text>
    <text x="120" y="90" text-anchor="middle" class="sub">llm.alem.ai/v1/audio</text>
  </g>
  <line x1="200" y1="77" x2="260" y2="132" stroke="#1D9E75" stroke-width="0.8" fill="none" marker-end="url(#arrow-green)"/>

  <!-- ===== FRONTEND ===== -->
  <g class="c-purple">
    <rect x="240" y="100" width="160" height="130" rx="8"/>
    <text x="320" y="126" text-anchor="middle" class="title">Frontend</text>
    <text x="320" y="145" text-anchor="middle" class="sub">HTML / CSS / JS</text>
    <text x="320" y="163" text-anchor="middle" class="sub">AI Тьютор</text>
    <text x="320" y="181" text-anchor="middle" class="sub">FakeGuard</text>
    <text x="320" y="199" text-anchor="middle" class="sub">GitLab Pages</text>
    <text x="320" y="218" text-anchor="middle" class="sub">index.html</text>
  </g>

  <!-- ===== ALEM.PLUS PLATFORM ===== -->
  <rect x="460" y="40" width="400" height="600" rx="16" class="platform-bg"/>
  <text x="660" y="72" text-anchor="middle" class="platform-label">alem.plus</text>
  <text x="660" y="90" text-anchor="middle" class="platform-sub">4 инструмента — максимальный балл</text>

  <!-- AlemLLM -->
  <g class="c-amber">
    <rect x="480" y="110" width="360" height="70" rx="8"/>
    <text x="660" y="138" text-anchor="middle" class="title">AlemLLM — 247B параметров</text>
    <text x="660" y="158" text-anchor="middle" class="sub">https://llm.alem.ai/v1 • model: alemllm • OpenAI-совместимый</text>
  </g>
  <text x="848" y="130" class="status-ok">✓</text>

  <!-- Speech -->
  <g class="c-amber">
    <rect x="480" y="200" width="360" height="70" rx="8"/>
    <text x="660" y="228" text-anchor="middle" class="title">Speech-to-text Kazakh</text>
    <text x="660" y="248" text-anchor="middle" class="sub">llm.alem.ai/v1/audio/transcriptions • WAV 16kHz</text>
  </g>
  <text x="848" y="220" class="status-ok">✓</text>

  <!-- RAGFlow -->
  <g class="c-amber">
    <rect x="480" y="290" width="360" height="70" rx="8"/>
    <text x="660" y="318" text-anchor="middle" class="title">RAGFlow — база знаний</text>
    <text x="660" y="338" text-anchor="middle" class="sub">a1-ragflow1.alem.ai • Информатика 10кл • 1274 чанка</text>
  </g>
  <text x="848" y="310" class="status-wait">⏳</text>

  <!-- Embedder -->
  <g class="c-amber">
    <rect x="480" y="380" width="360" height="70" rx="8"/>
    <text x="660" y="408" text-anchor="middle" class="title">Embedder — text-1024</text>
    <text x="660" y="428" text-anchor="middle" class="sub">llm.alem.ai/v1/embeddings • векторизация учебников</text>
  </g>
  <text x="848" y="400" class="status-ok">✓</text>

  <!-- FakeGuard -->
  <g class="c-pink">
    <rect x="480" y="470" width="360" height="70" rx="8"/>
    <text x="660" y="498" text-anchor="middle" class="title">FakeGuard — детектор фейков</text>
    <text x="660" y="518" text-anchor="middle" class="sub">AlemLLM • RU / ҚЗ / EN • текст + ссылка + фото</text>
  </g>
  <text x="848" y="490" class="status-ok">✓</text>

  <!-- GitLab -->
  <g class="c-gray">
    <rect x="480" y="560" width="360" height="54" rx="8"/>
    <text x="660" y="583" text-anchor="middle" class="title">GitLab — репозиторий</text>
    <text x="660" y="601" text-anchor="middle" class="sub">плюс.alem.ai • CI/CD • обязательное условие хакатона</text>
  </g>
  <text x="848" y="580" class="status-wait">⏳</text>

  <!-- Arrows frontend -> tools -->
  <line x1="400" y1="140" x2="478" y2="145" class="arr" marker-end="url(#arrow)"/>
  <line x1="400" y1="155" x2="478" y2="235" class="arr" marker-end="url(#arrow)"/>
  <line x1="400" y1="170" x2="478" y2="325" class="arr" marker-end="url(#arrow)"/>
  <line x1="400" y1="185" x2="478" y2="415" class="arr" marker-end="url(#arrow)"/>
  <line x1="400" y1="200" x2="478" y2="505" class="arr" marker-end="url(#arrow)"/>

  <!-- RAGFlow -> Embedder -->
  <line x1="660" y1="360" x2="660" y2="378" class="arr" marker-end="url(#arrow)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="40" y="640" width="12" height="12" rx="2" fill="#0a3d2e" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="58" y="650" class="legend-text" dominant-baseline="central">Пользователь</text>

  <rect x="160" y="640" width="12" height="12" rx="2" fill="#1e1a3d" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="178" y="650" class="legend-text" dominant-baseline="central">Frontend</text>

  <rect x="270" y="640" width="12" height="12" rx="2" fill="#2e1f08" stroke="#BA7517" stroke-width="0.5"/>
  <text x="288" y="650" class="legend-text" dominant-baseline="central">alem.plus API</text>

  <rect x="400" y="640" width="12" height="12" rx="2" fill="#2e0a1a" stroke="#D4537E" stroke-width="0.5"/>
  <text x="418" y="650" class="legend-text" dominant-baseline="central">FakeGuard</text>

  <text x="520" y="650" class="status-ok" dominant-baseline="central">✓ Готово</text>
  <text x="600" y="650" class="status-wait" dominant-baseline="central">⏳ В процессе</text>

  <!-- Watermark -->
  <text x="860" y="690" text-anchor="end" class="legend-text" font-size="10">Decentrathon 5.0 • 2026</text>
</svg>
</body>
</html>
